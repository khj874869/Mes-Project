server:
  port: 8080
spring:
  application:
    name: mes-core
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.mesproject.*
    producer:
      properties:
        spring.json.add.type.headers: false
  datasource:
    url: jdbc:postgresql://localhost:5432/mes_core
    username: mes
    password: mes
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

security:
  jwt:
    secret: "CHANGE_ME_TO_32+_CHARS_LONG_SECRET_KEY________"
    ttl-seconds: 3600
  bootstrap-admin:
    enabled: true
    username: admin
    password: admin1234

telemetry:
  ingest:
    api-key: change-me
