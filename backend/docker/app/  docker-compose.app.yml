services:
  mes-core:
    build:
      context: ../../..
      dockerfile: springboot/Dockerfile
      args:
        SERVICE: mes_core
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mes_core
      SPRING_DATASOURCE_USERNAME: mes
      SPRING_DATASOURCE_PASSWORD: mes
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on: [postgres, kafka]

  integration-hub:
    build:
      context: ../../..
      dockerfile: springboot/Dockerfile
      args:
        SERVICE: integration-hub
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/integration_hub
      SPRING_DATASOURCE_USERNAME: mes
      SPRING_DATASOURCE_PASSWORD: mes
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on: [postgres, kafka]

  nginx:
    build:
      context: ../../..
      dockerfile: springboot/docker/app/Dockerfile.nginx
    ports:
      - "80:80"
    depends_on: [mes-core, integration-hub]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mes
      POSTGRES_PASSWORD: mes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "29092:9092"

volumes:
  pgdata:
